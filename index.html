<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>チェロキー語入門</title>
</head>
<body>

<h2>平仮名読みからチェロキー文字への変換</h2>

<h6>※チェロキー語には“め”及び“ん”、濁音、半濁音に当該するものは基本的にありません｡そのため、“め”及び“ん”、濁音、半濁音を入力するとその文字は変換されません。</h6>
    
<input type="text" id="input" placeholder="ひらがなを入力">
<button onclick="run()">変換</button>

<button onclick="copyText()">コピー</button>

<p>

<h7>by 乙竹岩造</h7>

<p>

<button onclick="shareSite()">このサイトを共有</button>

<p>

<a href="tyeroki1.html">
チェロキー文字から平仮名への変換はこちら
</a>
</p>

<p id="output"></p>

<script>

const map = {
  "あ":"Ꭰ","い":"Ꭲ","う":"Ꭴ","え":"Ꭱ","お":"Ꭳ",
  "か":"Ꭷ","き":"Ꭹ","く":"Ꭻ","け":"Ꭸ","こ":"Ꭺ",
  "さ":"Ꮜ","し":"Ꮟ","す":"Ꮡ","せ":"Ꮞ","そ":"Ꮠ",
  "た":"Ꮤ","ち":"Ꮵ","つ":"Ꮷ","て":"Ꮦ","と":"Ꮩ",
  "な":"Ꮎ","に":"Ꮒ","ぬ":"Ꮔ","ね":"Ꮑ","の":"Ꮓ",
  "は":"Ꭽ","ひ":"Ꭿ","ふ":"Ꮁ","へ":"Ꭾ","ほ":"Ꮀ",
  "ま":"Ꮉ","み":"Ꮋ","む":"Ꮍ","も":"Ꮌ",
  "や":"Ꮿ","ゆ":"Ᏻ","よ":"Ᏺ",
  "ら":"Ꮃ","り":"Ꮅ","る":"Ꮇ","れ":"Ꮄ","ろ":"Ꮆ",
  "わ":"Ꮹ"
};

function run() {
  let input = document.getElementById("input").value;
  let result = "";
  for (let c of input) {
    result += map[c] || c;
  }
  document.getElementById("output").innerText = result;
}

function copyText() {
  const output = document.getElementById("output");
  if (!output.innerText) { 
    alert("変換結果がありません"); 
    return; 
  }

  const textarea = document.createElement("textarea");
  textarea.value = output.innerText;
  document.body.appendChild(textarea);
  textarea.select();

  try {
    document.execCommand("copy");
    alert("コピーしました！");
  } catch (err) {
    alert("コピーできませんでした");
  }

  document.body.removeChild(textarea);
}

function shareSite() {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({ title: "チェロキー文字変換サイト", url: url })
      .catch(err => console.log(err));
  } else {
    const textarea = document.createElement("textarea");
    textarea.value = url;
    document.body.appendChild(textarea);
    textarea.select();
    try {
      document.execCommand("copy");
      alert("URLをコピーしました！");
    } catch {
      alert("共有できませんでした");
    }
    document.body.removeChild(textarea);
  }
}

</script>

</body>
</html>
